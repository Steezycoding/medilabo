server:
  port: 9103
clients:
  gateway-microservice:
    api-url: http://localhost:9001/api
spring:
  application:
    name: risk-evaluator-microservice
  cloud:
    openfeign:
      client:
        config:
          patient-microservice:
            url: ${clients.gateway-microservice.api-url}
            connectTimeout: 5000
            readTimeout: 5000
          medical-note-microservice:
            url: ${clients.gateway-microservice.api-url}
            connectTimeout: 5000
            readTimeout: 5000
management:
  endpoints:
    web:
      exposure:
        include: health,info
  info:
    env:
      enabled: true
security:
  jwt:
    gateway-shared-secret: ${AUTH_JWT_SECRET:change-me-this-secret-should-be-long-32-chars}
    gateway-shared-issuer: ${AUTH_JWT_ISSUER:medilabo-gateway}