server:
  port: 9101
spring:
  application:
    name: patient-microservice
  datasource:
    url: jdbc:mysql://localhost:3307/patientdb?createDatabaseIfNotExists=true
    username: patientdb
    password: patientdb
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  sql:
    init:
      mode: never
      encoding: UTF-8
security:
  jwt:
    gateway-shared-secret: ${AUTH_JWT_SECRET:change-me-this-secret-should-be-long-32-chars}
    gateway-shared-issuer: ${AUTH_JWT_ISSUER:medilabo-gateway}