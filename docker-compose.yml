services:
  # Databases for microservices
  patient-ms-db:
    image: mysql:latest
    container_name: patient-ms-db
    env_file:
      - .env
    ports:
      - "3307:3306"
    volumes:
      - patient-ms-db-data:/var/lib/mysql
    networks:
      - medilabo-network

  medical-note-ms-db:
    image: mongo:latest
    container_name: medical-note-ms-db
    env_file:
      - .env
    ports:
      - "27018:27017"
    volumes:
      - medical-note-ms-db-data:/data/db
      - ./medical-note-microservice/src/main/resources/mongo-seed:/docker-entrypoint-initdb.d:ro
    networks:
      - medilabo-network

  # Microservices
  # Gateway microservice
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: gateway-microservice
    env_file:
      - .env
    environment:
      SPRING_CLOUD_GATEWAY_SERVER_WEBMVC_ROUTES_0_ID: patient-microservice
      SPRING_CLOUD_GATEWAY_SERVER_WEBMVC_ROUTES_0_URI: http://patient-microservice:9101
      SPRING_CLOUD_GATEWAY_SERVER_WEBMVC_ROUTES_0_PREDICATES_0: Path=/api/patients/**
      SPRING_CLOUD_GATEWAY_SERVER_WEBMVC_ROUTES_0_FILTERS_0: StripPrefix=1
    ports:
      - "9001:9001"
    networks:
      - medilabo-network

  # Patient microservice
  patient-microservice:
    build:
      context: ./patient-microservice
      dockerfile: Dockerfile
    container_name: patient-microservice
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://patient-ms-db:3306/patientdb?createDatabaseIfNotExists=true
      SPRING_DATASOURCE_USERNAME: patientdb
      SPRING_DATASOURCE_PASSWORD: patientdb
    ports:
      - "9101:9101"
    depends_on:
      - patient-ms-db
    networks:
      - medilabo-network

volumes:
  patient-ms-db-data:
  medical-note-ms-db-data:

networks:
  medilabo-network: