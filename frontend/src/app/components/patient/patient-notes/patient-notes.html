<div class="patient-notes">
  <div class="d-flex align-items-center mb-3">
    <h4 class="m-0">Notes</h4>
    <button class="btn btn-sm btn-primary ms-auto" data-bs-toggle="modal" data-bs-target="#addNoteModal">
      <i class="bi bi-plus-lg"></i>&nbsp;Add note
    </button>
  </div>

  @if (notes && notes.length) {
    <ul class="list-group">
      @for (note of notes; track note.createdAt) {
        <li class="list-group-item">
          <div class="d-flex align-items-start">
            <div class="flex-grow-1">
              <div class="d-flex justify-content-between align-items-start">
                <small class="text-muted">{{ note.createdAt | date:'yyyy/MM/dd HH:mm' }}</small>
                <div class="ms-2">
                  <button class="btn btn-sm btn-outline-danger" (click)="deleteNote(note.id)">
                    <i class="bi bi-trash"></i>
                  </button>
                </div>
              </div>

              <div class="mt-2">
                <p class="mb-1">
                  {{ note.content }}
                </p>
              </div>
            </div>
          </div>
        </li>
      }
    </ul>
  } @else {
    <div class="alert alert-warning" role="alert">
      No notes available for this patient.
    </div>
  }

  <div class="modal fade" id="addNoteModal" tabindex="-1" aria-labelledby="addNoteModalLabel" aria-hidden="true" #addNoteModalEl>
    <div class="modal-dialog">
      <div class="modal-content">
        <form id="noteForm" #noteForm="ngForm" (ngSubmit)="createNote(noteForm)">
          <div class="modal-header">
            <h1 class="modal-title fs-5" id="addNoteModalLabel">New note for <em>{{ patient?.firstName}} {{ patient?.lastName}}</em></h1>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <div class="form-floating">
              <textarea class="form-control" placeholder="Write a note here" id="noteContent" name="noteContent" [(ngModel)]="newNoteContent" required></textarea>
              <label for="noteContent">Note</label>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-danger" data-bs-dismiss="modal" (click)="resetForm(noteForm)">Cancel</button>
            <button type="submit" class="btn btn-primary" [disabled]="noteForm.invalid">Add note</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
